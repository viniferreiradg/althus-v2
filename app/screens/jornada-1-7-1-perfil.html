<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen has-bottom-nav menu-screen">

  <main class="scroll-area">

    <span class="menu-page-title" style="padding-top: 60px;  display: flow;  text-align: center;">Menu</span>

    <div class="settings-group settings-group--split">

      <button class="settings-item" type="button"
              onclick="router.push('jornada-1-7-6-notificacoes')"
              aria-label="Notificações — 3 novas">
        <span class="settings-item-icon">
          <i data-lucide="bell" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Notificações</span>
        <span class="settings-item-badge" aria-hidden="true">3</span>
        <i data-lucide="chevron-right" width="16" height="16" class="settings-item-chevron"></i>
      </button>

      <button class="settings-item" type="button"
              onclick="router.push('jornada-1-5-1-historico-lista')"
              aria-label="Histórico">
        <span class="settings-item-icon">
          <i data-lucide="history" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Histórico</span>
        <i data-lucide="chevron-right" width="16" height="16" class="settings-item-chevron"></i>
      </button>

      <button class="settings-item" type="button"
              onclick="router.push('jornada-1-7-9-meus-veiculos')"
              aria-label="Meus veículos">
        <span class="settings-item-icon">
          <i data-lucide="car" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Meus veículos</span>
        <i data-lucide="chevron-right" width="16" height="16" class="settings-item-chevron"></i>
      </button>

      <button class="settings-item" type="button"
              onclick="router.push('jornada-1-7-8-editar-perfil')"
              aria-label="Perfil">
        <span class="settings-item-icon">
          <i data-lucide="user" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Perfil</span>
        <i data-lucide="chevron-right" width="16" height="16" class="settings-item-chevron"></i>
      </button>

      <button class="settings-item" type="button"
              onclick="router.push('jornada-1-7-2-configuracoes')"
              aria-label="Configurações">
        <span class="settings-item-icon">
          <i data-lucide="settings" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Configurações</span>
        <i data-lucide="chevron-right" width="16" height="16" class="settings-item-chevron"></i>
      </button>

      <button class="settings-item" type="button"
              onclick="router.push('jornada-1-7-ajuda')"
              aria-label="Ajuda">
        <span class="settings-item-icon">
          <i data-lucide="help-circle" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Ajuda</span>
        <i data-lucide="chevron-right" width="16" height="16" class="settings-item-chevron"></i>
      </button>

      <button class="settings-item" type="button"
              onclick="router.push('jornada-1-7-chat')"
              aria-label="Chat">
        <span class="settings-item-icon">
          <i data-lucide="message-circle" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Chat</span>
        <i data-lucide="chevron-right" width="16" height="16" class="settings-item-chevron"></i>
      </button>

    </div>

  </main>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
