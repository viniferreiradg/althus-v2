<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biometria — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Toggle/Toggle.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Biometria</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="screen-content" style="padding-top: var(--spacing-md); overflow-y: auto; scrollbar-width: none;">

    <div class="settings-group">
      <label class="settings-item" for="bio-login">
        <span class="settings-item-icon">
          <i data-lucide="fingerprint" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Adicionar biometria no login</span>
        <label class="toggleWrapper" for="bio-login">
          <input type="checkbox" class="toggleInput" id="bio-login" />
          <span class="toggleTrack"><span class="toggleThumb"></span></span>
        </label>
      </label>
    </div>

  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
