<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendar Recarga — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/MapPin/MapPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/UserPin/UserPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Chip/Chip.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/TimeSlot/TimeSlot.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Modal/Modal.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-fullbleed map-bg-dark">

  <!-- ── Pins layer ────────────────────────────────────────── -->
  <div class="map-pins-layer" id="map-pins-layer">

    <div class="map-user-pin userPin pulse" role="img" aria-label="Sua localização">
      <span class="pingRing" aria-hidden="true"></span>
      <i data-lucide="user" width="18" height="18"></i>
    </div>

    <div class="map-pin-pos-1 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-2 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-3 pin-dcc">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="DCC">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="map-pin-center">
      <svg class="mapPin md brand selected" viewBox="0 0 24 24" fill="none" aria-label="Auto Shopping Eixo">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-center map-pin-center-2 pin-brand">
      <svg class="mapPin md brand" viewBox="0 0 24 24" fill="none" aria-label="Carregador">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </div>

  <!-- ── Top overlay ───────────────────────────────────── -->
  <div class="map-top-overlay"></div>

  <!-- ── Modal sobre o mapa ────────────────────────────── -->
  <div class="map-modal-overlay">
    <div class="modal">

      <div class="modalHeader">
        <div class="modalHeaderStart">
          <button class="modalNavBtn" onclick="router.pop()" aria-label="Voltar">
            <i data-lucide="chevron-left" width="20" height="20"></i>
          </button>
        </div>
        <div class="modalHeaderCenter">
          <h2 class="modalTitle">Agendar recarga</h2>
        </div>
        <div class="modalHeaderEnd">
          <button class="modalNavBtn" onclick="router.pop()" aria-label="Fechar">
            <i data-lucide="x" width="18" height="18"></i>
          </button>
        </div>
      </div>

      <!-- Seletor de dia — fixo acima do scroll -->
      <div class="day-picker" id="day-picker">
        <button class="day-picker__nav" id="day-prev" aria-label="Dias anteriores" disabled>
          <i data-lucide="chevron-left" width="18" height="18"></i>
        </button>
        <div class="day-picker__scroll" id="day-scroll" role="listbox" aria-label="Selecionar dia">
          <!-- gerado por JS -->
        </div>
        <button class="day-picker__nav" id="day-next" aria-label="Próximos dias">
          <i data-lucide="chevron-right" width="18" height="18"></i>
        </button>
      </div>

      <div class="modalBody">

        <!-- Horários disponíveis -->
        <div class="schedule-section">
          <span class="schedule-section__label">Horários disponíveis</span>
          <div class="time-slot-grid" id="slot-grid">
            <!-- gerado por JS -->
          </div>
        </div>

        <!-- Duração da recarga -->
        <div class="schedule-section">
          <span class="schedule-section__label">Duração da recarga</span>
          <div class="chipGroup" id="duration-group">
            <label class="chip" id="dur-30">
              <input type="radio" name="duration" value="30" checked />30 min
            </label>
            <label class="chip" id="dur-60">
              <input type="radio" name="duration" value="60" />1 hora
            </label>
            <label class="chip" id="dur-90">
              <input type="radio" name="duration" value="90" />1h30
            </label>
            <label class="chip" id="dur-120">
              <input type="radio" name="duration" value="120" />2 horas
            </label>
          </div>
        </div>

      </div><!-- /modalBody -->

      <div class="botoes-sheet">
        <button class="btn primary full-width" onclick="router.push('jornada-1-4-10-reserva-pagamento')" type="button">
          Ver resumo
        </button>
      </div>

    </div><!-- /modal -->
  </div><!-- /map-modal-overlay -->

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    /* ── Dados de demo ─────────────────────────────────── */
    var DAY_NAMES = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    /* Slots por dia (index 0 = hoje) — unavailable = true */
    var SLOTS_BY_DAY = [
      [ // hoje
        { time: '08:00', unavailable: false },
        { time: '08:30', unavailable: true  },
        { time: '09:00', unavailable: false },
        { time: '09:30', unavailable: false },
        { time: '10:00', unavailable: true  },
        { time: '10:30', unavailable: false },
        { time: '11:00', unavailable: false },
        { time: '11:30', unavailable: false },
        { time: '13:00', unavailable: true  },
        { time: '13:30', unavailable: false },
        { time: '14:00', unavailable: false },
        { time: '14:30', unavailable: true  },
      ],
      [ // amanhã
        { time: '07:30', unavailable: false },
        { time: '08:00', unavailable: false },
        { time: '08:30', unavailable: false },
        { time: '09:00', unavailable: true  },
        { time: '09:30', unavailable: false },
        { time: '10:00', unavailable: false },
        { time: '11:00', unavailable: true  },
        { time: '11:30', unavailable: false },
      ],
      [ // +2
        { time: '09:00', unavailable: false },
        { time: '09:30', unavailable: false },
        { time: '10:30', unavailable: true  },
        { time: '11:00', unavailable: false },
        { time: '14:00', unavailable: false },
        { time: '14:30', unavailable: true  },
      ],
      [ // +3
        { time: '08:30', unavailable: false },
        { time: '09:00', unavailable: true  },
        { time: '09:30', unavailable: false },
        { time: '10:00', unavailable: false },
        { time: '10:30', unavailable: false },
        { time: '11:00', unavailable: false },
        { time: '15:00', unavailable: false },
        { time: '15:30', unavailable: true  },
      ],
      [ // +4
        { time: '07:00', unavailable: false },
        { time: '07:30', unavailable: false },
        { time: '08:00', unavailable: true  },
        { time: '09:00', unavailable: false },
        { time: '09:30', unavailable: false },
        { time: '12:00', unavailable: false },
        { time: '12:30', unavailable: false },
      ],
      [ // +5
        { time: '10:00', unavailable: false },
        { time: '10:30', unavailable: false },
        { time: '11:00', unavailable: false },
        { time: '14:00', unavailable: true  },
        { time: '14:30', unavailable: false },
      ],
      [ // +6
        { time: '09:00', unavailable: false },
        { time: '10:00', unavailable: true  },
        { time: '11:00', unavailable: false },
        { time: '13:00', unavailable: false },
        { time: '14:00', unavailable: false },
        { time: '15:00', unavailable: true  },
      ],
    ];

    var PAGE_SIZE = 7;
    var pageOffset = 0;
    var selectedDay = 0;
    var selectedSlot = null;

    function buildDays() {
      var scroll = document.getElementById('day-scroll');
      scroll.innerHTML = '';
      var today = new Date();
      for (var i = 0; i < PAGE_SIZE; i++) {
        var d = new Date(today);
        d.setDate(today.getDate() + pageOffset + i);
        var dayName = DAY_NAMES[d.getDay()];
        var dayDate = String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0');
        var btn = document.createElement('button');
        btn.className = 'day-picker__day' + (i === selectedDay ? ' active' : '');
        btn.setAttribute('role', 'option');
        btn.setAttribute('aria-selected', i === selectedDay ? 'true' : 'false');
        btn.setAttribute('aria-label', dayName + ' ' + dayDate);
        btn.innerHTML =
          '<span class="day-picker__day-name">' + dayName + '</span>' +
          '<span class="day-picker__day-date">' + dayDate + '</span>';
        (function(idx) {
          btn.addEventListener('click', function() { selectedDay = idx; selectedSlot = null; buildDays(); buildSlots(); });
        })(i);
        scroll.appendChild(btn);
      }
      document.getElementById('day-prev').disabled = (pageOffset === 0);
    }

    function buildSlots() {
      var grid = document.getElementById('slot-grid');
      grid.innerHTML = '';
      var dayIndex = (pageOffset + selectedDay) % SLOTS_BY_DAY.length;
      var slots = SLOTS_BY_DAY[dayIndex] || [];
      slots.forEach(function(s) {
        var btn = document.createElement('button');
        var cls = 'timeSlot';
        if (s.unavailable) cls += ' unavailable';
        else if (selectedSlot === s.time) cls += ' selected';
        btn.className = cls;
        btn.type = 'button';
        btn.disabled = s.unavailable;
        btn.setAttribute('aria-pressed', selectedSlot === s.time ? 'true' : 'false');
        btn.textContent = s.time;
        if (!s.unavailable) {
          btn.addEventListener('click', function() {
            selectedSlot = s.time;
            buildSlots();
          });
        }
        grid.appendChild(btn);
      });
    }

    document.getElementById('day-prev').addEventListener('click', function() {
      if (pageOffset > 0) { pageOffset -= PAGE_SIZE; if (pageOffset < 0) pageOffset = 0; selectedDay = 0; selectedSlot = null; buildDays(); buildSlots(); }
    });

    document.getElementById('day-next').addEventListener('click', function() {
      pageOffset += PAGE_SIZE; selectedDay = 0; selectedSlot = null; buildDays(); buildSlots();
    });

    buildDays();
    buildSlots();
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
