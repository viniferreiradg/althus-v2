<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar recarga — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/MapPin/MapPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/UserPin/UserPin.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Card/Card.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Chip/Chip.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Modal/Modal.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-fullbleed map-bg-dark">

  <!-- ── Pins layer ────────────────────────────────────────── -->
  <div class="map-pins-layer" id="map-pins-layer">

    <div class="map-user-pin userPin pulse" role="img" aria-label="Sua localização">
      <span class="pingRing" aria-hidden="true"></span>
      <i data-lucide="user" width="18" height="18"></i>
    </div>

    <div class="map-pin-pos-1 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-2 pin-tupi">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="TUPI">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-pos-3 pin-dcc">
      <svg class="mapPin md distributor" viewBox="0 0 24 24" fill="none" aria-label="DCC">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="map-pin-center">
      <svg class="mapPin md brand selected" viewBox="0 0 24 24" fill="none" aria-label="Auto Shopping Eixo">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="map-pin-center map-pin-center-2 pin-brand">
      <svg class="mapPin md brand" viewBox="0 0 24 24" fill="none" aria-label="Carregador">
        <path class="pinBody" d="M12.601 21.799C14.461 20.193 20 14.993 20 10C20 7.87827 19.1571 5.84344 17.6569 4.34315C16.1566 2.84285 14.1217 2 12 2C9.87827 2 7.84344 2.84285 6.34315 4.34315C4.84285 5.84344 4 7.87827 4 10C4 14.993 9.539 20.193 11.399 21.799C11.5723 21.9293 11.7832 21.9998 12 21.9998C12.2168 21.9998 12.4277 21.9293 12.601 21.799Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="pinDot"  d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </div>

  <!-- ── Top overlay ───────────────────────────────────── -->
  <div class="map-top-overlay"></div>

  <!-- ── Modal sobre o mapa ────────────────────────────── -->
  <div class="map-modal-overlay">
    <div class="modal">

      <div class="modalHeader">
        <div class="modalHeaderStart">
          <button class="modalNavBtn" onclick="router.pop()" aria-label="Voltar">
            <i data-lucide="chevron-left" width="20" height="20"></i>
          </button>
        </div>
        <div class="modalHeaderCenter">
          <h2 class="modalTitle">Confirmar recarga</h2>
        </div>
        <div class="modalHeaderEnd">
          <button class="modalNavBtn" onclick="router.pop()" aria-label="Fechar">
            <i data-lucide="x" width="18" height="18"></i>
          </button>
        </div>
      </div>

      <div class="modalBody">

        <!-- Carregador identificado -->
        <div class="card recarga-charger-card">
          <div class="recarga-charger-icon">
            <i data-lucide="zap" width="22" height="22"></i>
          </div>
          <div class="recarga-charger-body">
            <span class="recarga-charger-name">Auto Shopping Eixo</span>
            <span class="recarga-charger-meta">Ponto #3 · CCS2 · 50 kW</span>
          </div>
          <span class="reserva-badge reserva-badge--ativa">Disponível</span>
        </div>

        <!-- Duração -->
        <p class="sheet-section-label">Duração da recarga</p>
        <div class="chipGroup">
          <label class="chip">
            <input type="radio" name="duration" value="30" onchange="updateEstimate(30)" />
            30 min
          </label>
          <label class="chip">
            <input type="radio" name="duration" value="60" checked onchange="updateEstimate(60)" />
            1 hora
          </label>
          <label class="chip">
            <input type="radio" name="duration" value="90" onchange="updateEstimate(90)" />
            1h 30min
          </label>
          <label class="chip">
            <input type="radio" name="duration" value="120" onchange="updateEstimate(120)" />
            2 horas
          </label>
        </div>

        <!-- Estimativa dinâmica -->
        <div class="recarga-estimate-card">
          <div class="recarga-estimate-item">
            <span class="recarga-estimate-value" id="est-valor">R$ 19,00</span>
            <span class="recarga-estimate-label">Valor estimado</span>
          </div>
          <div class="recarga-estimate-divider" aria-hidden="true"></div>
          <div class="recarga-estimate-item">
            <span class="recarga-estimate-value--secondary" id="est-kwh">~18,9 kWh</span>
            <span class="recarga-estimate-label">Energia estimada</span>
          </div>
        </div>

        <!-- Pagamento -->
        <p class="sheet-section-label">Pagamento</p>
        <div class="wallet-balance-row">
          <div class="wallet-balance-row__left">
            <div class="wallet-balance-row__icon">
              <i data-lucide="wallet" width="18" height="18"></i>
            </div>
            <div>
              <div class="wallet-balance-row__label-group">
                <p class="wallet-balance-row__label">Saldo da carteira</p>
                <span class="wallet-status-badge wallet-status-badge--amount">R$ 45,20</span>
              </div>
            </div>
          </div>
          <button class="btn secondary sm" style="width: auto;" type="button" onclick="router.push('jornada-1-4-6c-forma-pagamento')">Trocar</button>
        </div>

      </div><!-- /modalBody -->

      <div class="botoes-sheet">
        <button class="btn primary full-width" type="button"
                onclick="router.push('jornada-1-4-7-recarga-andamento')"
                aria-label="Iniciar recarga">
          <span class="icon"><i data-lucide="zap" width="16" height="16"></i></span>
          Iniciar recarga
        </button>
      </div>

    </div><!-- /modal -->
  </div><!-- /map-modal-overlay -->

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    var estimativas = {
      30:  { valor: 'R$ 9,50',  kwh: '~9,5 kWh'  },
      60:  { valor: 'R$ 19,00', kwh: '~18,9 kWh' },
      90:  { valor: 'R$ 28,50', kwh: '~28,4 kWh' },
      120: { valor: 'R$ 38,00', kwh: '~37,8 kWh' },
    };

    function updateEstimate(mins) {
      var est = estimativas[mins];
      document.getElementById('est-valor').textContent = est.valor;
      document.getElementById('est-kwh').textContent   = est.kwh;
    }
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
