<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Veículo — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen has-bottom-nav">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Cadastrar Veículo</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="cadastro-body">

    <div class="wrapper">
      <label class="label" for="manual-marca">Marca</label>
      <div class="inputWrap">
        <input class="input" id="manual-marca" type="text" placeholder="Ex: Toyota, Honda…" />
      </div>
    </div>

    <div class="wrapper">
      <label class="label" for="manual-modelo">Modelo</label>
      <div class="inputWrap">
        <input class="input" id="manual-modelo" type="text" placeholder="Ex: bZ4X, e:NS1…" />
      </div>
    </div>

    <div class="wrapper">
      <label class="label" for="manual-conector">Tipo de conector</label>
      <div class="inputWrap">
        <input class="input" id="manual-conector" type="text" placeholder="Ex: CCS2, CHAdeMO…" />
      </div>
    </div>

  </div>

  <div class="cadastro-footer">
    <button class="btn primary full-width" type="button" onclick="router.pop()">
      Salvar veículo
    </button>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
