<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histórico — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen has-bottom-nav">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Histórico</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <!-- Abas -->
  <div class="hist-tabs" role="tablist">
    <button class="hist-tab hist-tab--active" role="tab" aria-selected="true">Recargas</button>
    <button class="hist-tab" role="tab" aria-selected="false"
            onclick="router.replace('jornada-1-5-2-historico-carteira')">Carteira</button>
  </div>

  <main class="scroll-area">
    <div class="hist-list">

      <button class="hist-item" type="button"
              onclick="router.push('jornada-1-5-3-historico-detalhe')" aria-label="Shopping Iguatemi">
        <div class="hist-item__body">
          <span class="hist-item__name">Shopping Iguatemi</span>
          <span class="hist-item__meta">08/06/2026 · 14:32 · 28,5 kWh</span>
        </div>
        <div class="hist-item__right">
          <span class="hist-item__price">R$ 42,30</span>
          <i data-lucide="chevron-right" width="16" height="16" class="hist-item__chevron"></i>
        </div>
      </button>

      <button class="hist-item" type="button"
              onclick="router.push('jornada-1-5-3-historico-detalhe')" aria-label="Posto Althus Higienópolis">
        <div class="hist-item__body">
          <span class="hist-item__name">Posto Althus Higienópolis</span>
          <span class="hist-item__meta">05/06/2026 · 09:15 · 24,2 kWh</span>
        </div>
        <div class="hist-item__right">
          <span class="hist-item__price">R$ 36,80</span>
          <i data-lucide="chevron-right" width="16" height="16" class="hist-item__chevron"></i>
        </div>
      </button>

      <button class="hist-item" type="button"
              onclick="router.push('jornada-1-5-3-historico-detalhe')" aria-label="Shopping JK Iguatemi">
        <div class="hist-item__body">
          <span class="hist-item__name">Shopping JK Iguatemi</span>
          <span class="hist-item__meta">01/06/2026 · 18:47 · 32,1 kWh</span>
        </div>
        <div class="hist-item__right">
          <span class="hist-item__price">R$ 51,20</span>
          <i data-lucide="chevron-right" width="16" height="16" class="hist-item__chevron"></i>
        </div>
      </button>

      <button class="hist-item" type="button"
              onclick="router.push('jornada-1-5-3-historico-detalhe')" aria-label="Eletroposto Paulista">
        <div class="hist-item__body">
          <span class="hist-item__name">Eletroposto Paulista</span>
          <span class="hist-item__meta">27/05/2026 · 11:08 · 19,3 kWh</span>
        </div>
        <div class="hist-item__right">
          <span class="hist-item__price">R$ 28,90</span>
          <i data-lucide="chevron-right" width="16" height="16" class="hist-item__chevron"></i>
        </div>
      </button>

      <button class="hist-item" type="button"
              onclick="router.push('jornada-1-5-3-historico-detalhe')" aria-label="Shopping Eldorado">
        <div class="hist-item__body">
          <span class="hist-item__name">Shopping Eldorado</span>
          <span class="hist-item__meta">20/05/2026 · 16:22 · 25,7 kWh</span>
        </div>
        <div class="hist-item__right">
          <span class="hist-item__price">R$ 38,40</span>
          <i data-lucide="chevron-right" width="16" height="16" class="hist-item__chevron"></i>
        </div>
      </button>

      <button class="hist-item" type="button"
              onclick="router.push('jornada-1-5-3-historico-detalhe')" aria-label="Posto Althus Pinheiros">
        <div class="hist-item__body">
          <span class="hist-item__name">Posto Althus Pinheiros</span>
          <span class="hist-item__meta">15/05/2026 · 10:48 · 22,3 kWh</span>
        </div>
        <div class="hist-item__right">
          <span class="hist-item__price">R$ 33,10</span>
          <i data-lucide="chevron-right" width="16" height="16" class="hist-item__chevron"></i>
        </div>
      </button>

    </div>
  </main>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
