<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excluir Conta — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/OTPInput/OTPInput.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft">
      <button class="appBarIconBtn" onclick="router.pop()" aria-label="Voltar">
        <i data-lucide="chevron-left" width="24" height="24"></i>
      </button>
    </div>
    <span class="appBarTitle">Excluir Conta</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <div class="cadastro-body">

    <!-- Ícone de aviso -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md) 0;">
      <div style="width: 56px; height: 56px; border-radius: var(--radius-full); background: var(--color-status-error-bg); display: flex; align-items: center; justify-content: center;">
        <i data-lucide="triangle-alert" width="24" height="24" style="color: var(--color-action-error);"></i>
      </div>
      <span style="font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-text-primary);">Tem certeza?</span>
    </div>

    <!-- Aviso -->
    <div class="sheet-guest-notice-text" style="text-align: left;">
      A exclusão da conta é <strong>permanente e irreversível</strong>. Todos os seus dados serão removidos, incluindo:
    </div>

    <div class="settings-group">
      <div class="settings-item" style="cursor: default; pointer-events: none;">
        <span class="settings-item-icon" style="background: var(--color-status-error-bg); color: var(--color-action-error);">
          <i data-lucide="clock" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Histórico de recargas</span>
      </div>
      <div class="settings-item" style="cursor: default; pointer-events: none;">
        <span class="settings-item-icon" style="background: var(--color-status-error-bg); color: var(--color-action-error);">
          <i data-lucide="wallet" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Saldo na carteira</span>
      </div>
      <div class="settings-item" style="cursor: default; pointer-events: none;">
        <span class="settings-item-icon" style="background: var(--color-status-error-bg); color: var(--color-action-error);">
          <i data-lucide="car" width="16" height="16"></i>
        </span>
        <span class="settings-item-label">Veículos cadastrados</span>
      </div>
    </div>

    <!-- Confirmação por PIN -->
    <div class="wrapper">
      <label class="label">Confirme seu PIN para continuar</label>
      <div class="otpRoot" id="otp-pin" role="group" aria-label="PIN de confirmação">
        <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" aria-label="Dígito 1 de 6" />
        <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" aria-label="Dígito 2 de 6" />
        <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" aria-label="Dígito 3 de 6" />
        <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" aria-label="Dígito 4 de 6" />
        <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" aria-label="Dígito 5 de 6" />
        <input class="otpCell otpCellMasked" type="text" maxlength="1" inputmode="numeric" aria-label="Dígito 6 de 6" />
      </div>
    </div>

  </div>

  <div class="cadastro-footer">
    <button class="btn ghost full-width" type="button" onclick="router.pop()">
      Cancelar
    </button>
    <button class="btn destructive full-width" type="button"
            onclick="router.replace('jornada-1-2-1-login')">
      <i data-lucide="trash-2" width="16" height="16"></i>
      Excluir minha conta
    </button>
  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };

    (function () {
      var cells   = Array.from(document.querySelectorAll('#otp-pin .otpCell'));
      var btnExcluir = document.querySelector('.btn.destructive');
      btnExcluir.disabled = true;

      cells.forEach(function (cell, i) {
        cell.addEventListener('input', function () {
          cell.value = cell.value.replace(/\D/g, '').slice(-1);
          cell.classList.toggle('filled', cell.value.length > 0);
          if (cell.value && i < cells.length - 1) cells[i + 1].focus();
          btnExcluir.disabled = !cells.every(function (c) { return c.value.length > 0; });
        });
        cell.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace' && cell.value === '' && i > 0) cells[i - 1].focus();
        });
        cell.addEventListener('focus', function () { cell.select(); });
      });
    }());
  </script>

  <script>lucide.createIcons();</script>

</body>
</html>
