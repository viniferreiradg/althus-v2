<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postos — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Input/Input.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <header class="appBar">
    <div class="appBarSide appBarSideLeft"></div>
    <span class="appBarTitle">Postos</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <!-- ── Toolbar: busca ────────────────────────────── -->
  <div class="postos-toolbar">
    <div class="wrapper hasLeft">
      <div class="inputWrap">
        <span class="iconLeft"><i data-lucide="search" width="16" height="16"></i></span>
        <input class="input" type="search" placeholder="Qual carregador você procura?" />
      </div>
    </div>
  </div>

  <!-- ── Lista de localidades ───────────────────────── -->
  <div class="postos-list">

    <button class="posto-item" type="button" onclick="router.push('jornada-1-4-2-map-sheet')">
      <div class="posto-dist">
        <span class="posto-dist__value">0,8</span>
        <span class="posto-dist__unit">km</span>
      </div>
      <div class="posto-item-info">
        <span class="posto-item-name">Auto Shopping Eixo</span>
        <span class="posto-item-address">Av. das Nações Unidas, 14261 — Stª Amaro</span>
        <span class="posto-item-rate">Valor por kW: <strong>R$ 2,29</strong></span>
        <div class="posto-kw-badges">
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">50 kW</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item" type="button">
      <div class="posto-dist">
        <span class="posto-dist__value">1,2</span>
        <span class="posto-dist__unit">km</span>
      </div>
      <div class="posto-item-info">
        <span class="posto-item-name">Iguatemi São Paulo</span>
        <span class="posto-item-address">Av. Brigadeiro Faria Lima, 2232 — Jd. Paulistano</span>
        <span class="posto-item-rate">Valor por kW: <strong>R$ 2,49</strong></span>
        <div class="posto-kw-badges">
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">22 kW</span>
          <span class="posto-kw-badge">50 kW</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item" type="button">
      <div class="posto-dist">
        <span class="posto-dist__value">2,5</span>
        <span class="posto-dist__unit">km</span>
      </div>
      <div class="posto-item-info">
        <span class="posto-item-name">Shopping Morumbi</span>
        <span class="posto-item-address">Av. Roque Petroni Jr., 1089 — Morumbi</span>
        <span class="posto-item-rate">Valor por kW: <strong>R$ 1,99</strong></span>
        <div class="posto-kw-badges">
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">22 kW</span>
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">22 kW</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item" type="button">
      <div class="posto-dist">
        <span class="posto-dist__value">3,1</span>
        <span class="posto-dist__unit">km</span>
      </div>
      <div class="posto-item-info">
        <span class="posto-item-name">Parque do Ibirapuera</span>
        <span class="posto-item-address">Av. Pedro Álvares Cabral, s/n — Vila Mariana</span>
        <span class="posto-item-rate">Valor por kW: <strong>R$ 2,10</strong></span>
        <div class="posto-kw-badges">
          <span class="posto-kw-badge">22 kW</span>
          <span class="posto-kw-badge">22 kW</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item" type="button">
      <div class="posto-dist">
        <span class="posto-dist__value">4,7</span>
        <span class="posto-dist__unit">km</span>
      </div>
      <div class="posto-item-info">
        <span class="posto-item-name">WTorre Nações Unidas</span>
        <span class="posto-item-address">Av. das Nações Unidas, 12995 — Brooklin</span>
        <span class="posto-item-rate">Valor por kW: <strong>R$ 2,29</strong></span>
        <div class="posto-kw-badges">
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">50 kW</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <!-- Desativados — todos os carregadores ocupados -->
    <button class="posto-item posto-item-disabled" type="button" aria-disabled="true">
      <div class="posto-dist">
        <span class="posto-dist__value">1,8</span>
        <span class="posto-dist__unit">km</span>
      </div>
      <div class="posto-item-info">
        <span class="posto-item-name">Shopping Eldorado</span>
        <span class="posto-item-address">Av. Rebouças, 3970 — Pinheiros</span>
        <span class="posto-item-rate">Valor por kW: <strong>R$ 2,19</strong></span>
        <div class="posto-kw-badges">
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">22 kW</span>
          <span class="posto-kw-badge">22 kW</span>
        </div>
        <div class="posto-item-reason">
          <i data-lucide="clock" width="12" height="12"></i>
          <span>Todos os carregadores ocupados</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <button class="posto-item posto-item-disabled" type="button" aria-disabled="true">
      <div class="posto-dist">
        <span class="posto-dist__value">5,2</span>
        <span class="posto-dist__unit">km</span>
      </div>
      <div class="posto-item-info">
        <span class="posto-item-name">Continental Shopping</span>
        <span class="posto-item-address">Av. das Nações, 1570 — Guarulhos</span>
        <span class="posto-item-rate">Valor por kW: <strong>R$ 2,09</strong></span>
        <div class="posto-kw-badges">
          <span class="posto-kw-badge">22 kW</span>
          <span class="posto-kw-badge">22 kW</span>
        </div>
        <div class="posto-item-reason">
          <i data-lucide="clock" width="12" height="12"></i>
          <span>Todos os carregadores ocupados</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

    <!-- Desativado — conector incompatível -->
    <button class="posto-item posto-item-disabled" type="button" aria-disabled="true">
      <div class="posto-dist">
        <span class="posto-dist__value">6,0</span>
        <span class="posto-dist__unit">km</span>
      </div>
      <div class="posto-item-info">
        <span class="posto-item-name">Posto Ipiranga Bandeirantes</span>
        <span class="posto-item-address">Rod. dos Bandeirantes, km 18 — Alphaville</span>
        <span class="posto-item-rate">Valor por kW: <strong>R$ 1,89</strong></span>
        <div class="posto-kw-badges">
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">50 kW</span>
          <span class="posto-kw-badge">50 kW</span>
        </div>
        <div class="posto-item-reason">
          <i data-lucide="plug" width="12" height="12"></i>
          <span>Conector incompatível</span>
        </div>
      </div>
      <div class="posto-item-chevron"><i data-lucide="chevron-right" width="16" height="16"></i></div>
    </button>

  </div>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
