<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliações — Althus</title>
  <link rel="stylesheet" href="../../storybook-app/src/tokens/tokens.css" />
  <link rel="stylesheet" href="../../shared/page-mobile.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/AppBar/AppBar.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Tab/Tab.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/BottomNav/BottomNav.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/NotificationBadge/NotificationBadge.module.css" />
  <link rel="stylesheet" href="../../storybook-app/src/components/Button/Button.module.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="layout-screen">

  <!-- ── AppBar ─────────────────────────────────────── -->
  <header class="appBar">
    <div class="appBarSide appBarSideLeft"></div>
    <span class="appBarTitle">Pontos de recarga</span>
    <div class="appBarSide appBarSideRight"></div>
  </header>

  <!-- ── Tabs ───────────────────────────────────────── -->
  <div class="tabList" role="tablist" aria-label="Seções">
    <button class="tabBtn tabLeft" role="tab" aria-selected="false"
            type="button" onclick="router.tab('jornada-1-4-lista-postos')">Reservas</button>
    <button class="tabBtn tabMiddle" role="tab" aria-selected="false"
            type="button" onclick="router.tab('jornada-1-5-pontos-recargas')">Recargas</button>
    <button class="tabBtn tabBtnActive tabRight" role="tab" aria-selected="true"
            type="button">Avaliações</button>
  </div>

  <!-- ── Conteúdo ───────────────────────────────────── -->
  <main class="scroll-area" role="tabpanel">

    <!-- ── Seção: Pendentes ───────────────────────── -->
    <p class="list-section-title">Pendentes</p>
    <div class="reservas-list">

      <div class="reserva-item">
        <span class="reserva-item__icon">
          <i data-lucide="fuel" width="18" height="18"></i>
        </span>
        <span class="reserva-item__body">
          <span class="reserva-item__name">Posto Althus Asa Norte</span>
          <span class="reserva-item__meta">Visitado em 20/05/2026</span>
        </span>
        <button class="btn secondary" type="button" onclick="router.modal('jornada-1-5-avaliar-posto')">Avaliar</button>
      </div>

      <div class="reserva-item">
        <span class="reserva-item__icon">
          <i data-lucide="fuel" width="18" height="18"></i>
        </span>
        <span class="reserva-item__body">
          <span class="reserva-item__name">Shopping Iguatemi</span>
          <span class="reserva-item__meta">Visitado em 28/05/2026</span>
        </span>
        <button class="btn secondary" type="button" onclick="router.modal('jornada-1-5-avaliar-posto')">Avaliar</button>
      </div>

    </div>

    <!-- ── Seção: Histórico de avaliações ─────────── -->
    <p class="list-section-title">Histórico de avaliações</p>
    <div class="reservas-list">

      <button class="reserva-item" type="button">
        <span class="reserva-item__icon">
          <i data-lucide="fuel" width="18" height="18"></i>
        </span>
        <span class="reserva-item__body">
          <span class="reserva-item__name">Auto Shopping Eixo</span>
          <span class="reserva-item__meta">12/05/2026</span>
        </span>
        <span class="reserva-item__right">
          <span class="star-row" aria-label="5 de 5 estrelas">
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
          </span>
        </span>
      </button>

      <button class="reserva-item" type="button">
        <span class="reserva-item__icon">
          <i data-lucide="fuel" width="18" height="18"></i>
        </span>
        <span class="reserva-item__body">
          <span class="reserva-item__name">Posto Althus Asa Sul</span>
          <span class="reserva-item__meta">03/05/2026</span>
        </span>
        <span class="reserva-item__right">
          <span class="star-row" aria-label="4 de 5 estrelas">
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--empty"><i data-lucide="star" width="13" height="13"></i></span>
          </span>
        </span>
      </button>

      <button class="reserva-item" type="button">
        <span class="reserva-item__icon">
          <i data-lucide="fuel" width="18" height="18"></i>
        </span>
        <span class="reserva-item__body">
          <span class="reserva-item__name">Shopping Center Norte</span>
          <span class="reserva-item__meta">25/04/2026</span>
        </span>
        <span class="reserva-item__right">
          <span class="star-row" aria-label="3 de 5 estrelas">
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--filled"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--empty"><i data-lucide="star" width="13" height="13"></i></span>
            <span class="star-icon star-icon--empty"><i data-lucide="star" width="13" height="13"></i></span>
          </span>
        </span>
      </button>

    </div>

  </main>

  <script>
    var router = (window.parent && window.parent.router)
      ? window.parent.router
      : { push: function(){}, pop: function(){}, replace: function(){}, modal: function(){}, closeModal: function(){}, tab: function(){} };
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
